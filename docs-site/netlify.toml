# Netlify config for the LitZap docs site (Nextra / Next.js).
# Create this as a SEPARATE Netlify site with base directory = docs-site.
[build]
  base = "docs-site"
  command = "npm run build"
  publish = ".next"
  # Skip the build unless something in this site's folder (docs-site/) actually
  # changed — saves free-tier build minutes on a monorepo. Exit 0 = skip.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ."

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
